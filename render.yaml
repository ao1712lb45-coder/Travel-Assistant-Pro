services:
  - type: web
    name: travel-assistant-pro-ao1712
    runtime: node
    plan: free
    region: singapore
    branch: develop/1.1.0
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_USER
        value: team
      - key: APP_PASSWORD
        sync: false
