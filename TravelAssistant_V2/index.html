<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Travel Assistant V2.0</title>
<style>
:root{--bg:#f3f6fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#d8e1ec;--brand:#b42345;--accent:#f97316;--ok:#087a55}*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink)}header{padding:22px;background:linear-gradient(135deg,#881337,#f97316);color:#fff}header h1{margin:0;font-size:25px}header p{margin:6px 0 0;opacity:.92}.wrap{max-width:1180px;margin:18px auto;padding:0 14px;display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 6px 20px #1720330c;overflow:hidden}.section{padding:16px;border-bottom:1px solid #edf1f6}.section:last-child{border:0}h2{margin:0 0 12px;font-size:17px}label{display:block;font-size:13px;font-weight:700;margin:8px 0 5px}input,textarea,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:9px;font:inherit}textarea{min-height:90px;resize:vertical}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}button{border:0;border-radius:9px;padding:10px 13px;font-weight:700;cursor:pointer;background:#e8edf5;color:#24324a}button.primary{color:#fff;background:linear-gradient(135deg,var(--brand),var(--accent))}button.green{color:#fff;background:#0f8a62}.hint{padding:10px;border:1px solid #e4eaf2;border-radius:9px;background:#f8fafc;color:var(--muted);font-size:13px;line-height:1.55}.status{margin-top:9px;font-size:13px;font-weight:700;color:var(--ok)}.result{padding:11px;border-bottom:1px solid #e5e7eb}.result:last-child{border:0}.resultTitle{font-weight:800}.meta{font-size:12px;color:var(--muted);margin-top:4px}.tags{margin-top:6px}.tag{display:inline-block;padding:3px 7px;margin:2px;border-radius:999px;background:#eef2ff;color:#3f51b5;font-size:11px}.empty{padding:18px;text-align:center;color:var(--muted)}.output{min-height:300px;white-space:pre-wrap}@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>Travel Assistant V2.0</h1><p>智慧行程資料庫・城市／國家同義搜尋・團號解析・一鍵產生社群文案</p></header>
<div class="wrap">
<section class="card">
<div class="section"><h2>建立／更新行程</h2>
<div class="grid2"><div><label>團號</label><input id="code" placeholder="例如 PUS05JX261001AA"></div><div><label>行程名稱</label><input id="title" placeholder="例如 釜山海陸空五日"></div></div>
<label>副標／景點</label><textarea id="subtitle" placeholder="天空膠囊、松島纜車、甘川洞文化村…"></textarea>
<div class="grid2"><div><label>最低售價</label><input id="price" placeholder="29,900元起"></div><div><label>航空公司</label><input id="airline" placeholder="星宇航空"></div></div>
<label>出發日期</label><input id="dates" placeholder="10/1、10/8、10/15">
<label>亮點（每行一項）</label><textarea id="highlights"></textarea>
<div class="btns"><button class="primary" id="save">儲存行程</button><button id="clear">清空欄位</button><button id="importOld">匯入 V10.1 舊資料</button></div><div id="saveStatus" class="status"></div></div>
<div class="section"><h2>社群文案</h2><div class="grid2"><div><label>平台</label><select id="platform"><option>LINE</option><option>Facebook</option><option>Threads</option></select></div><div><label>聯絡資訊</label><input id="contact" value="喜鴻假期－ㄚ喜｜0988894313（LINE電話號碼搜尋）"></div></div><div class="btns"><button class="green" id="makeCopy">產生文案</button><button id="copy">複製文案</button></div><textarea id="output" class="output"></textarea></div>
</section>
<section class="card">
<div class="section"><h2>V2.0 智慧搜尋</h2><input id="search" placeholder="搜尋釜山、PUS、韓國、天空膠囊、星宇、3萬內…"><div class="hint" style="margin-top:9px">搜尋會同時比對：團號、城市代碼、城市、國家、行程名稱、副標、景點亮點、航空公司、日期與價格。例：輸入「釜山」可找到 PUS 團；輸入「韓國」可找到釜山、首爾、濟州行程。</div><div id="count" class="status"></div></div>
<div id="results"></div>
<div class="section"><div class="btns"><button id="export">匯出 JSON</button><input type="file" id="importFile" accept="application/json" hidden><button id="import">匯入 JSON</button><button id="reset">清空資料庫</button></div></div>
</section>
</div>
<script>
const $=id=>document.getElementById(id),clean=v=>(v||'').toString().replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim();
const CITY={PUS:{city:'釜山',country:'韓國',aliases:['釜山','부산','busan','pus','韓國','南韓']},SEL:{city:'首爾',country:'韓國',aliases:['首爾','首尔','서울','seoul','sel','韓國','南韓']},ICN:{city:'首爾',country:'韓國',aliases:['仁川','首爾','incheon','seoul','icn','韓國','南韓']},CJU:{city:'濟州島',country:'韓國',aliases:['濟州','濟州島','제주','jeju','cju','韓國','南韓']},TYO:{city:'東京',country:'日本',aliases:['東京','tokyo','tyo','日本']},OSA:{city:'大阪',country:'日本',aliases:['大阪','osaka','osa','日本','關西']},FUK:{city:'九州',country:'日本',aliases:['九州','福岡','fukuoka','fuk','日本']},SPK:{city:'北海道',country:'日本',aliases:['北海道','札幌','sapporo','spk','日本']},CTS:{city:'北海道',country:'日本',aliases:['北海道','札幌','新千歲','cts','日本']},SDJ:{city:'東北仙台',country:'日本',aliases:['東北','仙台','sendai','sdj','日本']},OKA:{city:'沖繩',country:'日本',aliases:['沖繩','沖绳','okinawa','oka','日本']},BKK:{city:'曼谷',country:'泰國',aliases:['曼谷','bangkok','bkk','泰國']},HKT:{city:'普吉島',country:'泰國',aliases:['普吉','普吉島','phuket','hkt','泰國']},DAD:{city:'峴港',country:'越南',aliases:['峴港','岘港','danang','da nang','dad','越南']},SGN:{city:'胡志明市',country:'越南',aliases:['胡志明','西貢','saigon','sgn','越南']}};
const AIR={BR:'長榮航空',CI:'中華航空',JX:'星宇航空',KE:'大韓航空',OZ:'韓亞航空',TR:'酷航',IT:'台灣虎航',TG:'泰國航空',VN:'越南航空'};
const normalize=s=>clean(s).toLowerCase().normalize('NFKC').replace(/[，、。；：:｜|／/\\\-_()（）【】\[\]]/g,' ').replace(/\s+/g,' ').trim();
function codeInfo(code){const c=clean(code).toUpperCase(),m=c.match(/^([A-Z]{3})(\d{2})([A-Z0-9]{2})/),loc=m&&CITY[m[1]];return{dest:m?m[1]:'',days:m?parseInt(m[2],10):'',air:m?(AIR[m[3]]||''):'',city:loc?.city||'',country:loc?.country||'',aliases:loc?.aliases||[]}}
function enrich(r){const ci=codeInfo(r.code);return{...r,city:r.city||ci.city,country:r.country||ci.country,airline:r.airline||ci.air,aliases:[...(r.aliases||[]),...ci.aliases].filter(Boolean)}}
function searchText(r){r=enrich(r);return normalize([r.code,r.title,r.subtitle,r.price,r.airline,r.dates,r.city,r.country,(r.highlights||[]).join(' '),(r.aliases||[]).join(' ')].join(' '))}
function score(r,q){const text=searchText(r),terms=normalize(q).split(' ').filter(Boolean);if(!terms.length)return 1;let total=0;for(const t of terms){if(text.includes(t))total+=10;else{const chars=[...t];const hit=chars.filter(c=>text.includes(c)).length;if(t.length>=2&&hit/t.length>=.7)total+=4;else return 0}}const title=normalize(r.title),code=normalize(r.code);if(title.includes(normalize(q)))total+=8;if(code.includes(normalize(q)))total+=7;return total}
function getDb(){try{return JSON.parse(localStorage.getItem('travelAssistantV2Db')||'[]').map(enrich)}catch{return[]}}
function setDb(v){localStorage.setItem('travelAssistantV2Db',JSON.stringify(v));render()}
function current(){return enrich({code:clean($('code').value),title:clean($('title').value),subtitle:clean($('subtitle').value),price:clean($('price').value),airline:clean($('airline').value),dates:clean($('dates').value),highlights:$('highlights').value.split(/\r?\n/).map(clean).filter(Boolean),updated:new Date().toISOString()})}
function load(r){$('code').value=r.code||'';$('title').value=r.title||'';$('subtitle').value=r.subtitle||'';$('price').value=r.price||'';$('airline').value=r.airline||'';$('dates').value=r.dates||'';$('highlights').value=(r.highlights||[]).join('\n');window.scrollTo({top:0,behavior:'smooth'})}
function render(){const q=$('search').value,all=getDb(),rows=all.map(r=>({r,s:score(r,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s||new Date(b.r.updated)-new Date(a.r.updated));$('count').textContent=`找到 ${rows.length} 筆／共 ${all.length} 筆行程`;$('results').innerHTML='';if(!rows.length){$('results').innerHTML='<div class="empty">沒有符合行程。可嘗試城市、國家、團號、景點或航空公司。</div>';return}rows.forEach(({r})=>{const d=document.createElement('div');d.className='result';d.innerHTML=`<div class="resultTitle">${r.code?clean(r.code)+'｜':''}${clean(r.title)||'未命名行程'}</div><div class="meta">${[r.city,r.country,r.airline,r.dates,r.price].filter(Boolean).join('・')}</div><div class="tags">${[...(r.highlights||[]).slice(0,4),...(r.aliases||[]).slice(0,3)].map(x=>`<span class="tag">${clean(x)}</span>`).join('')}</div><div class="btns"><button data-load>載入</button><button data-del>刪除</button></div>`;d.querySelector('[data-load]').onclick=()=>load(r);d.querySelector('[data-del]').onclick=()=>setDb(getDb().filter(x=>(x.code||x.title)!==(r.code||r.title)));$('results').appendChild(d)})}
$('save').onclick=()=>{const r=current();if(!r.code&&!r.title){$('saveStatus').textContent='請至少輸入團號或行程名稱。';return}let db=getDb(),key=r.code||r.title,i=db.findIndex(x=>(x.code||x.title)===key);i>=0?db[i]=r:db.unshift(r);setDb(db);$('saveStatus').textContent=`已儲存：${r.city||r.country||'行程'}；搜尋「${r.city||r.country||r.code}」可直接找到。`};
$('clear').onclick=()=>['code','title','subtitle','price','airline','dates','highlights'].forEach(id=>$(id).value='');
$('search').oninput=render;
$('importOld').onclick=()=>{let old=[];try{old=JSON.parse(localStorage.getItem('travelV10Db')||'[]')}catch{}if(!old.length){$('saveStatus').textContent='此瀏覽器沒有找到 V10.1 舊資料。';return}const merged=[...getDb()];old.map(x=>enrich({...x,title:x.title||x.mainTitle||'',highlights:Array.isArray(x.highlights)?x.highlights:[]})).forEach(r=>{const key=r.code||r.title;if(!merged.some(x=>(x.code||x.title)===key))merged.push(r)});setDb(merged);$('saveStatus').textContent=`已匯入 ${old.length} 筆 V10.1 資料。`};
function makeCopy(){const d=current(),h=d.highlights.slice(0,5),p=$('platform').value,c=clean($('contact').value);let out='';if(p==='Threads')out=`最近整理到一團 ${d.city||d.country||''} 行程。\n\n${d.title}\n${h.slice(0,3).join('、')||d.subtitle}\n${d.airline||''}｜${d.dates||''}\n${d.price||''}\n\n想看完整行程可以私訊我。`;else if(p==='Facebook')out=`✈️ ${d.title}\n\n${d.subtitle||h.join('、')}\n\n📅 出發日期：${d.dates||'請洽詢'}\n💰 ${d.price||'售價請洽詢'}\n🛫 ${d.airline||''}\n\n${h.map(x=>'✅ '+x).join('\n')}\n\n📲 報名請洽\n${c}`;else out=`🔥 ${d.title}\n${d.subtitle||h.slice(0,3).join('、')}\n📅 ${d.dates||'日期請洽'}\n💰 ${d.price||'售價請洽'}\n✈️ ${d.airline||''}\n\n📲 ${c}`;$('output').value=out}
$('makeCopy').onclick=makeCopy;$('copy').onclick=async()=>{await navigator.clipboard.writeText($('output').value)};
$('export').onclick=()=>{const a=document.createElement('a');a.download='Travel_Assistant_V2_database.json';a.href=URL.createObjectURL(new Blob([JSON.stringify(getDb(),null,2)],{type:'application/json'}));a.click()};$('import').onclick=()=>$('importFile').click();$('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>{try{const v=JSON.parse(fr.result);if(!Array.isArray(v))throw Error();setDb(v.map(enrich))}catch{alert('匯入失敗：JSON 格式錯誤')}};fr.readAsText(f)};$('reset').onclick=()=>{if(confirm('確定清空 V2.0 資料庫？'))setDb([])};
render();
</script></body></html>
